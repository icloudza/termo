# XcodeGen 声明式工程定义。改这里后运行 `xcodegen generate` 重新生成 Termo.xcodeproj。
# 业务代码全部直接归属 Termo App target（单一模块，与原 SwiftPM 可执行目标同构）；
# 第三方/vendored 依赖以 Swift Package 形式引入（SwiftTerm 远程 + 三个本地 CodeEdit 包）。
name: Termo

options:
  bundleIdPrefix: com.cloudza
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true        # 子目录(App/Core/Features/UI/System)映射为分组
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    # 版本号唯一源是 Termo/Info.plist 的 CFBundleShortVersionString / CFBundleVersion
    # （运行期由 AppInfo 从主包读取，打包脚本从构建产物 Info.plist 读取）。这里不再重复声明
    # MARKETING_VERSION，避免与 Info.plist 不一致；升版本只改 Info.plist 一处即可。
    SWIFT_VERSION: "5.9"
    DEAD_CODE_STRIPPING: YES
    ARCHS: arm64                  # 仅 Apple Silicon（放弃 Intel）：相比通用二进制约省一半体积
    # 开发签名：自动管理，由 Xcode 用本账号的 Apple Development 证书签名 + 自动管描述文件。
    # 分发证书（直发 Developer ID Application / 上架 Apple Distribution）待创建后再按发布方式覆盖；
    # package-app.sh 归档时仍以参数覆盖为 ad-hoc，公证管线接入时再改那里。
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: KTP97H9YFF

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  CodeEditSourceEditor:
    path: LocalPackages/CodeEditSourceEditor
  # CodeEditTextView 由 App 直接 import，需单列；CodeEditSymbols 仅经 CodeEditSourceEditor
  # 的相对 path 传递引入，不在此重复声明（避免 identity 冲突）。
  CodeEditTextView:
    path: LocalPackages/CodeEditTextView

targets:
  Termo:
    type: application
    platform: macOS
    sources:
      - path: Termo
        excludes:
          - "Info.plist"          # 作为 INFOPLIST_FILE，不当资源拷贝
          - "**/.DS_Store"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditTextView      # App 直接 import；CodeEditSymbols 经此传递引入，无需显式声明
        product: CodeEditTextView
      # RDP：内嵌 FreeRDP 静态库 xcframework（只链接不嵌入）+ 其依赖的系统框架/库。
      - framework: Vendor/CFreeRDP.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: CoreFoundation.framework
    settings:
      base:
        INFOPLIST_FILE: Termo/Info.plist
        # RDP ObjC 桥：经桥接头暴露给 Swift；FreeRDP/WinPR 头经版本化子目录搜索。
        SWIFT_OBJC_BRIDGING_HEADER: Termo/Features/RDP/Bridge/Termo-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/CFreeRDP.xcframework/macos-arm64/Headers/freerdp3
          - $(SRCROOT)/Vendor/CFreeRDP.xcframework/macos-arm64/Headers/winpr3
        OTHER_LDFLAGS:
          - -lz          # FreeRDP/WinPR/OpenSSL 依赖 zlib（系统动态库）
          - -lresolv     # WinPR DNS/解析依赖
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: Termo
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudza.termo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Termo.entitlements
        ENABLE_HARDENED_RUNTIME: NO       # 上架/公证阶段再打开
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Osize"          # 体积优先（对 IO/终端型应用性能影响可忽略）
          ASSETCATALOG_COMPILER_OPTIMIZATION: space   # 资产目录按体积优化
          # 去符号由 xcodebuild archive 的 install-time 处理（strip 主程序 + 分离 dSYM）；
          # 见 scripts/package-app.sh。dwarf-with-dsym 为 Release 默认，保留以便崩溃符号化。

# 共享 scheme：供 xcodebuild -scheme Termo 打包（scripts/package-app.sh）与 Xcode 运行/归档使用。
schemes:
  Termo:
    build:
      targets:
        Termo: all
    run:
      config: Debug
    archive:
      config: Release
