name: 功能建议 / Feature request
description: 提出新功能或改进 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / What problem does this solve
      description: 你遇到的场景或痛点。/ The scenario or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 / Proposed solution
      description: 希望 Termo 怎么做。/ How you'd like Termo to behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案（可选）/ Alternatives (optional)
